name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Regressie-evaluatie (alleen op gecommitte testdocumenten, offline)
        run: |
          # Alleen synth-edge-cases.md staat in git — echte testdocumenten
          # zijn gitignored (bevatten echte PII). De --offline vlag slaat
          # de LLM-laag over zodat geen API-sleutel nodig is.
          # --min-precision 1.0: de regex-laag mag nooit false positives
          # introduceren, dat is de hele belofte van deterministische detectie.
          python evalueer.py testset/ --offline --no-memory --min-precision 1.0
