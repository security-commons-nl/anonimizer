name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Standaard Python-tests via herbruikbare workflow in security-commons-nl/.github
  tests:
    uses: security-commons-nl/.github/.github/workflows/python-ci.yml@main
    with:
      python-version: "3.12"
      test-command: "pytest tests/ -v"

  # Documentatie-compliance conform DOCUMENTATION-STANDARD.md
  docs:
    uses: security-commons-nl/.github/.github/workflows/doc-compliance.yml@main
    with:
      require-gebruik: false         # anonimizer heeft docs/handleiding.md (CLI-tool)
      require-architectuur: false    # docs/concept.md dient als architectuur
      require-configuratie: false

  # Anonimizer-specifieke regressie: de regex-laag moet 100% precision houden
  evalueer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Regressie-evaluatie (offline, geen LLM-credits)
        run: python evalueer.py testset/ --offline --no-memory --min-precision 1.0
